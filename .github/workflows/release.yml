name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Build React Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install and build
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Upload client dist
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: packages/client/dist/
          retention-days: 1

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-chat-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-chat-macos-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agent-chat-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: packages/client/dist/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} -p agent-chat

      - name: Package binary (macOS)
        if: runner.os == 'macOS'
        run: |
          cp target/${{ matrix.target }}/release/agent-chat agent-chat
          chmod +x agent-chat
          tar czf ${{ matrix.artifact }}.tar.gz agent-chat

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target/${{ matrix.target }}/release/agent-chat.exe agent-chat.exe
          Compress-Archive -Path agent-chat.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  build-universal-macos:
    name: Build Universal macOS binary
    needs: build-cli
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agent-chat-macos-arm64
      - uses: actions/download-artifact@v4
        with:
          name: agent-chat-macos-x86_64

      - name: Create universal binary
        run: |
          tar xzf agent-chat-macos-arm64.tar.gz && mv agent-chat agent-chat-arm64
          tar xzf agent-chat-macos-x86_64.tar.gz && mv agent-chat agent-chat-x86_64
          lipo -create -output agent-chat agent-chat-arm64 agent-chat-x86_64
          chmod +x agent-chat
          tar czf agent-chat-macos-universal.tar.gz agent-chat

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-chat-macos-universal
          path: agent-chat-macos-universal.tar.gz

  build-tauri:
    name: Build Tauri (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: packages/client/dist/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.target }}

      - name: Cache Tauri CLI
        id: tauri-cli-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: ${{ runner.os }}-tauri-cli-2

      - name: Install Tauri CLI
        if: steps.tauri-cli-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}
        working-directory: crates/agent-chat-desktop

      - name: Package Tauri app (macOS)
        if: runner.os == 'macOS'
        run: |
          cd crates/agent-chat-desktop/target/${{ matrix.target }}/release/bundle/macos/
          tar czf AgentChat-${{ matrix.target }}.app.tar.gz AgentChat.app

      - name: Upload Tauri artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: AgentChat-${{ matrix.target }}
          path: crates/agent-chat-desktop/target/${{ matrix.target }}/release/bundle/macos/AgentChat-${{ matrix.target }}.app.tar.gz

      - name: Upload Tauri artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: AgentChat-windows-setup
          path: crates/agent-chat-desktop/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  release:
    name: Create Release
    needs: [build-cli, build-universal-macos, build-tauri]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
