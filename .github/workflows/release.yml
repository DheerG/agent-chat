name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Build React Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install and build
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Upload client dist
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: packages/client/dist/
          retention-days: 1

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-chat-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-chat-macos-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agent-chat-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: packages/client/dist/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} -p agent-chat

      - name: Package binary (macOS)
        if: runner.os == 'macOS'
        run: |
          cp target/${{ matrix.target }}/release/agent-chat agent-chat
          chmod +x agent-chat
          tar czf ${{ matrix.artifact }}.tar.gz agent-chat

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/agent-chat.exe agent-chat.exe
          7z a ${{ matrix.artifact }}.zip agent-chat.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  build-universal-macos:
    name: Build Universal macOS binary
    needs: build-cli
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agent-chat-macos-arm64
      - uses: actions/download-artifact@v4
        with:
          name: agent-chat-macos-x86_64

      - name: Create universal binary
        run: |
          tar xzf agent-chat-macos-arm64.tar.gz
          mv agent-chat agent-chat-arm64
          tar xzf agent-chat-macos-x86_64.tar.gz
          mv agent-chat agent-chat-x86_64
          lipo -create -output agent-chat agent-chat-arm64 agent-chat-x86_64
          chmod +x agent-chat
          tar czf agent-chat-macos-universal.tar.gz agent-chat

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-chat-macos-universal
          path: agent-chat-macos-universal.tar.gz

  build-tauri:
    name: Build Tauri (macOS ${{ matrix.target }})
    needs: prepare
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact-name: AgentChat-macos-arm64
          - target: x86_64-apple-darwin
            artifact-name: AgentChat-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: packages/client/dist/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}
        working-directory: crates/agent-chat-desktop

      - name: Package Tauri app
        shell: bash
        run: |
          APP_PATH="target/${{ matrix.target }}/release/bundle/macos/AgentChat.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::AgentChat.app not found at expected path"
            echo "Searching for .app bundle..."
            find target -name "AgentChat.app" -type d 2>/dev/null
            exit 1
          fi
          cd target/${{ matrix.target }}/release/bundle/macos
          tar czf "$GITHUB_WORKSPACE/${{ matrix.artifact-name }}.app.tar.gz" AgentChat.app

      - name: Upload Tauri artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}.app.tar.gz

  release:
    name: Create Release
    needs: [build-cli, build-universal-macos, build-tauri]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" \) -exec cp {} release-files/ \;
          echo "Release files:"
          ls -la release-files/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-files/*
