name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-chat-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-chat-macos-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agent-chat-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build React client
        run: pnpm install && pnpm build

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} -p agent-chat

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/agent-chat ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/agent-chat.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-universal-macos:
    name: Build Universal macOS binary
    needs: build-cli
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agent-chat-macos-arm64
      - uses: actions/download-artifact@v4
        with:
          name: agent-chat-macos-x86_64

      - name: Create universal binary
        run: |
          chmod +x agent-chat-macos-arm64 agent-chat-macos-x86_64
          lipo -create -output agent-chat-macos-universal agent-chat-macos-arm64 agent-chat-macos-x86_64

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-chat-macos-universal
          path: agent-chat-macos-universal

  build-tauri:
    name: Build Tauri (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build React client
        run: pnpm install && pnpm build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}
        working-directory: crates/agent-chat-desktop

      - name: Upload Tauri artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: AgentChat-${{ matrix.target }}.dmg
          path: crates/agent-chat-desktop/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Tauri artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: AgentChat-windows-setup.exe
          path: crates/agent-chat-desktop/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  release:
    name: Create Release
    needs: [build-cli, build-universal-macos, build-tauri]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
